<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="#1A1510"/>

  <!-- Outer gold border -->
  <rect x="16" y="16" width="480" height="480" rx="48" fill="none" stroke="#C4973A" stroke-width="1.5" opacity="0.4"/>

  <!-- Inner gold border -->
  <rect x="40" y="40" width="432" height="432" rx="32" fill="none" stroke="#C4973A" stroke-width="0.75" opacity="0.25"/>

  <!-- Central diamond -->
  <rect x="224" y="224" width="64" height="64" rx="2" transform="rotate(45 256 256)" fill="#C4973A"/>

  <!-- Top dot -->
  <circle cx="256" cy="176" r="5" fill="#C4973A" opacity="0.5"/>
  <!-- Bottom dot -->
  <circle cx="256" cy="336" r="5" fill="#C4973A" opacity="0.5"/>
  <!-- Left dot -->
  <circle cx="176" cy="256" r="5" fill="#C4973A" opacity="0.5"/>
  <!-- Right dot -->
  <circle cx="336" cy="256" r="5" fill="#C4973A" opacity="0.5"/>

  <!-- Top line -->
  <line x1="220" y1="176" x2="256" y2="176" stroke="#C4973A" stroke-width="1" opacity="0.3" transform="rotate(0 256 256)"/>
  <line x1="256" y1="176" x2="292" y2="176" stroke="#C4973A" stroke-width="1" opacity="0.3"/>
  <!-- Bottom line -->
  <line x1="220" y1="336" x2="292" y2="336" stroke="#C4973A" stroke-width="1" opacity="0.3"/>
  <!-- Left line -->
  <line x1="176" y1="220" x2="176" y2="292" stroke="#C4973A" stroke-width="1" opacity="0.3"/>
  <!-- Right line -->
  <line x1="336" y1="220" x2="336" y2="292" stroke="#C4973A" stroke-width="1" opacity="0.3"/>
</svg>
